name: Deployment

on:
  push:
    branches: [main, develop]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set deploy path
        id: config
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "path=/var/www/papikost-production/app" >> "$GITHUB_OUTPUT"
            echo "env=production" >> "$GITHUB_OUTPUT"
          else
            echo "path=/var/www/papikost-sandbox/app" >> "$GITHUB_OUTPUT"
            echo "env=sandbox" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ steps.config.outputs.path }}
            bash deploy.sh ${{ github.ref_name }}

      - name: Summary
        run: echo "Deployed **${{ steps.config.outputs.env }}**"
